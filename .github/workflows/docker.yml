name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: List files for debugging
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo "Docker directory contents:"
          ls -la docker/ || echo "No docker directory"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: ./docker
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.8 \
            uvicorn==0.34.0 \
            sqlalchemy==2.0.37 \
            psycopg-binary==3.2.4 \
            psycopg==3.2.4 \
            pytest==8.4.2 \
            pytest-asyncio==0.25.3 \
            httpx==0.28.1
      
      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_USER=kubsu \
            -e POSTGRES_PASSWORD=kubsu \
            -e POSTGRES_DB=kubsu \
            -p 5432:5432 \
            postgres:16-alpine
          
          for i in {1..15}; do
            if docker exec postgres-test pg_isready -U kubsu 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... $i/15"
            sleep 2
          done
      
      - name: Run tests
        working-directory: ./docker
        env:
          DATABASE_URL: postgresql+psycopg://kubsu:kubsu@localhost:5432/kubsu
          PYTHONPATH: .
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "Tests not found in docker/tests"
            ls -la
            exit 1
          fi
      
      - name: Stop PostgreSQL
        if: always()
        run: docker stop postgres-test || true

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/"
          target: "~/app"
          strip_components: 1
          overwrite: true
      
      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            
            echo "Starting deployment..."
            cd ~/app
            
            echo "Directory structure:"
            ls -la
            
            # Создаем .env файл
            echo "Creating .env file..."
            cat > .env << EOF
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            DATABASE_URL=postgresql+psycopg://kubsu:${{ secrets.DB_PASSWORD }}@postgres:5432/kubsu
            EOF
            
            # Останавливаем старые контейнеры
            echo "Stopping old containers..."
            docker compose down 2>/dev/null || docker-compose down 2>/dev/null || true
            
            # Запускаем новые контейнеры
            echo "Starting new containers..."
            docker compose up -d --build 2>/dev/null || docker-compose up -d --build
            
            # Проверяем статус
            echo "Checking container status..."
            docker compose ps 2>/dev/null || docker-compose ps
            
            # Очищаем старые образы
            echo "Cleaning up..."
            docker system prune -f
            
            echo "Deployment completed successfully!"