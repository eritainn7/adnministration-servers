name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: ./docker
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.8 \
            uvicorn==0.34.0 \
            sqlalchemy==2.0.37 \
            psycopg-binary==3.2.4 \
            psycopg==3.2.4 \
            pytest==8.4.2 \
            pytest-asyncio==0.25.3 \
            httpx==0.28.1
      
      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_USER=kubsu \
            -e POSTGRES_PASSWORD=kubsu \
            -e POSTGRES_DB=kubsu \
            -p 5432:5432 \
            postgres:16-alpine
          
          for i in {1..15}; do
            if docker exec postgres-test pg_isready -U kubsu 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... $i/15"
            sleep 2
          done
      
      - name: Run tests
        working-directory: ./docker
        env:
          DATABASE_URL: postgresql+psycopg://kubsu:kubsu@localhost:5432/kubsu
          PYTHONPATH: .
        run: |
          pytest tests/ -v --tb=short
      
      - name: Stop PostgreSQL
        if: always()
        run: docker stop postgres-test || true