version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kubsu_postgres_dev
    environment:
      POSTGRES_USER: kubsu
      POSTGRES_PASSWORD: kubsu
      POSTGRES_DB: kubsu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubsu"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kubsu_network_dev

  app:
    build: .
    container_name: kubsu_app_dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://kubsu:kubsu@postgres:5432/kubsu
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - kubsu_network_dev

networks:
  kubsu_network_dev:
    driver: bridge

volumes:
  postgres_data_dev: