version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kubsu_postgres
    environment:
      POSTGRES_USER: kubsu
      POSTGRES_PASSWORD: kubsu
      POSTGRES_DB: kubsu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubsu"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kubsu_network

  tests:
    build: .
    container_name: kubsu_tests
    environment:
      DATABASE_URL: postgresql+psycopg://kubsu:kubsu@postgres:5432/kubsu
      TESTING: 1
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 2 &&
        echo 'Running tests...' &&
        pytest tests/ -v -s --tb=short &&
        TEST_EXIT_CODE=$$? &&
        if [ $$TEST_EXIT_CODE -eq 0 ]; then
          echo '✓ All tests passed successfully!';
          exit 0;
        else
          echo '✗ Tests failed with exit code ' $$TEST_EXIT_CODE;
          exit $$TEST_EXIT_CODE;
        fi
      "
    networks:
      - kubsu_network
    restart: "no"

  app:
    build: .
    container_name: kubsu_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://kubsu:kubsu@postgres:5432/kubsu
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      tests:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - kubsu_network
    restart: "no"

networks:
  kubsu_network:
    driver: bridge

volumes:
  postgres_data: